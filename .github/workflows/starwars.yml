name: Generate star wars animation

on:
  schedule:
    - cron: "0 */24 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate starwars-contribution-graph.svg
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/starwars.svg?palette=github-dark&color_snake=#00FF00&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
            dist/starwars-dark.svg?palette=github-dark&color_snake=#FFD700&color_dots=#000000,#1a1a1a,#333333,#666666,#999999

      - name: push starwars-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
